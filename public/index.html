<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenCode Tasks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #08090a;
      --bg-surface: #0d0e10;
      --bg-elevated: #131416;
      --bg-hover: #1a1b1e;
      --border: #1e2023;
      --text-primary: #e8e8e8;
      --text-secondary: #8b8d91;
      --text-tertiary: #5a5c60;
      --text-muted: #3d3f42;
      --accent: #E86F33;
      --accent-dim: rgba(232, 111, 51, 0.15);
      --accent-glow: rgba(232, 111, 51, 0.4);
      --success: #3ecf8e;
      --success-dim: rgba(62, 207, 142, 0.12);
      --warning: #f0b429;
      --warning-dim: rgba(240, 180, 41, 0.12);
      --mono: 'IBM Plex Mono', monospace;
      --serif: 'Playfair Display', serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.5;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Subtle scan-line texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.03) 2px,
        rgba(0,0,0,0.03) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Layout */
    .app { display: flex; height: 100vh; }

    /* Sidebar removed */

    .connection {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--warning);
    }

    .connection-dot.live {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
    }

    .connection-dot.error {
      background: #ef4444;
    }

    /* Sidebar sections */
    .sidebar-section {
      display: flex;
      flex-direction: column;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-section.flex-1 {
      flex: 1;
      border-bottom: none;
      overflow: hidden;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
    }

    /* Sidebar filters removed */

    /* Live Updates panel removed */

    /* Sessions list removed */

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.9); }
    }

    /* Footer removed */

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg-deep);
    }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 13px;
    }

    /* Session view */
    .session-view {
      flex: 1;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    .session-view.visible {
      display: flex;
    }

    /* Header */
    .view-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .view-title {
      font-family: var(--serif);
      font-size: 20px;
      font-weight: 400;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .view-meta {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }

    .view-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: flex-start;
    }

    .session-controls {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-elevated);
    }

    .session-controls label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .project-filter {
      min-width: 160px;
      max-width: 260px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
    }

    .project-filter:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .bulk-archive-btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-surface);
      color: var(--text-secondary);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .bulk-archive-btn:hover:not(:disabled) {
      color: var(--text-primary);
      border-color: var(--text-muted);
      background: var(--bg-hover);
    }

    .bulk-archive-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .clear-selection-btn {
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg-elevated);
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s ease;
      white-space: nowrap;
    }

    .clear-selection-btn:hover:not(:disabled) {
      color: var(--text-primary);
      border-color: var(--text-muted);
      background: var(--bg-hover);
    }

    .clear-selection-btn:disabled {
      opacity: 0.45;
      cursor: default;
    }

    .view-progress {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .view-progress .progress-bar {
      width: 120px;
      height: 3px;
    }

    .progress-bar {
      background: var(--border);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    .view-progress .progress-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
    }

    .icon-btn {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
      border-color: var(--text-muted);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
    }

    .icon-btn-danger {
      color: #ef4444;
    }

    .icon-btn-danger:hover {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border-color: #ef4444;
    }

    /* Kanban */
    .kanban {
      flex: 1;
      display: flex;
      gap: 24px;
      padding: 24px;
      overflow-x: auto;
    }

    .kanban-column {
      width: 320px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 16px;
    }

    .column-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

     .column-dot.pending { background: var(--text-muted); }
     .column-dot.in-progress {
       background: var(--accent);
       box-shadow: 0 0 12px var(--accent-glow);
       animation: pulse 2s ease-in-out infinite;
     }
     .column-dot.completed { background: var(--success); }
     .column-dot.cancelled { background: var(--text-tertiary); }

    .column-title {
      font-size: 12px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

     .column-title.pending { color: var(--text-tertiary); }
     .column-title.in-progress { color: var(--accent); }
     .column-title.completed { color: var(--success); }
     .column-title.cancelled { color: var(--text-muted); }

    .column-count {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }

    .column-count.pending {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }

    .column-count.in-progress {
      background: var(--accent-dim);
      color: var(--accent);
    }

     .column-count.completed {
       background: var(--success-dim);
       color: var(--success);
     }

     .column-count.cancelled {
       background: var(--bg-elevated);
       color: var(--text-muted);
     }

    .column-tasks {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .column-empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* Task card */
    .task-card {
      padding: 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      position: relative;
    }

    .task-card.selected {
      border-color: var(--accent);
      box-shadow: inset 0 0 0 1px var(--accent), 0 0 12px var(--accent-dim);
    }

    .task-card:hover {
      background: var(--bg-elevated);
      border-color: var(--text-muted);
      transform: translateY(-1px);
    }

    .card-select {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: var(--accent);
      cursor: pointer;
      z-index: 2;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    .task-card:hover .card-select {
      opacity: 1;
      pointer-events: auto;
    }

    .task-card.has-selection .task-title,
    .task-card.has-selection .session-meta-row {
      margin-right: 24px;
    }

    .task-card.in-progress {
      border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-dim);
    }

     .task-card.completed {
       opacity: 0.6;
     }

     .task-card.cancelled {
       opacity: 0.45;
     }

    .task-card.blocked {
      opacity: 0.5;
    }

    .task-id {
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .task-badge {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

     .task-badge.blocked {
       background: var(--warning-dim);
       color: var(--warning);
     }

     .task-badge.priority-high {
       background: rgba(239, 68, 68, 0.12);
       color: #ef4444;
     }

     .task-badge.priority-medium {
       background: var(--warning-dim);
       color: var(--warning);
     }

     .task-badge.priority-low {
       background: rgba(96, 165, 250, 0.12);
       color: #60a5fa;
     }

    .task-title {
      font-size: 13px;
      color: var(--text-primary);
      line-height: 1.4;
    }

     .task-card.completed .task-title {
       text-decoration: line-through;
       color: var(--text-tertiary);
     }

     .task-card.cancelled .task-title {
       text-decoration: line-through;
       color: var(--text-tertiary);
     }

    .task-session {
      font-size: 11px;
      color: var(--accent);
      margin-top: 6px;
      opacity: 0.8;
    }

    .session-meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 8px;
      font-size: 11px;
      color: var(--text-tertiary);
    }

    .session-project {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--accent);
      opacity: 0.85;
    }

    .session-right {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      color: var(--text-tertiary);
    }

    .runtime-pill {
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      color: var(--warning);
    }

    .task-active {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--accent);
    }

    .task-active::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .task-blocked {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .task-desc {
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Detail panel */
    .detail-panel {
      width: 400px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border);
      display: none;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
    }

    .detail-panel.visible {
      display: flex;
    }

    .detail-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .detail-header h3 {
      font-family: var(--serif);
      font-size: 14px;
      font-weight: 500;
    }

    .detail-close {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .detail-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .detail-close svg {
      width: 16px;
      height: 16px;
    }

    .detail-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .detail-section {
      margin-bottom: 20px;
    }

    .detail-label {
      font-size: 10px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .detail-title {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.4;
    }

    /* Markdown rendering (safe subset) */
    .markdown {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .markdown > *:last-child { margin-bottom: 0; }

    .markdown p {
      margin: 0 0 12px 0;
      white-space: normal;
    }

    .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
      margin: 0 0 10px 0;
      font-family: var(--serif);
      font-weight: 500;
      color: var(--text-primary);
    }

    .markdown ul, .markdown ol {
      margin: 0 0 12px 0;
      padding-left: 20px;
    }

    .markdown li { margin: 4px 0; }

    .markdown code {
      font-family: var(--mono);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      padding: 1px 5px;
      border-radius: 6px;
      color: var(--text-primary);
    }

    .markdown pre {
      margin: 0 0 12px 0;
      padding: 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
    }

    .markdown pre code {
      border: none;
      background: transparent;
      padding: 0;
      display: block;
      color: var(--text-primary);
      white-space: pre;
    }

    .markdown a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 111, 51, 0.35);
    }

    .markdown a:hover {
      border-bottom-color: rgba(232, 111, 51, 0.8);
    }

    .markdown blockquote {
      margin: 0 0 12px 0;
      padding: 10px 12px;
      border-left: 2px solid var(--accent);
      background: var(--accent-dim);
      border-radius: 8px;
      color: var(--text-primary);
    }

    .markdown hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    .markdown-title {
      color: var(--text-primary);
    }

    .markdown-title > :first-child {
      font-family: var(--serif);
      font-size: 18px;
      line-height: 1.4;
      color: var(--text-primary);
    }

    .detail-status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 4px;
    }

    .detail-status.pending {
      background: var(--bg-elevated);
      color: var(--text-tertiary);
    }

    .detail-status.cancelled {
      background: var(--bg-elevated);
      color: var(--text-muted);
    }

    .detail-status.in_progress {
      background: var(--accent-dim);
      color: var(--accent);
    }

    .detail-status.completed {
      background: var(--success-dim);
      color: var(--success);
    }

    .detail-status .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: currentColor;
    }

    .detail-status.in_progress .dot {
      animation: pulse 2s ease-in-out infinite;
    }

    .detail-box {
      padding: 12px;
      border-radius: 6px;
      font-size: 12px;
    }

    .detail-box.active {
      background: var(--accent-dim);
      border: 1px solid rgba(232, 111, 51, 0.2);
      color: var(--accent);
    }

    .detail-box.blocked {
      background: var(--warning-dim);
      border: 1px solid rgba(240, 180, 41, 0.2);
      color: var(--warning);
    }

    .detail-box.blocks {
      background: rgba(96, 165, 250, 0.1);
      border: 1px solid rgba(96, 165, 250, 0.2);
      color: #60a5fa;
    }

    .detail-desc {
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-secondary);
    }

    .detail-desc pre {
      background: var(--bg-elevated);
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 12px 0;
      font-size: 12px;
    }

    .detail-desc code {
      background: var(--bg-elevated);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .detail-desc pre code {
      background: transparent;
      padding: 0;
    }

    .detail-desc hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 16px 0;
    }

    .detail-desc h4 {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--accent);
      margin: 0 0 8px 0;
    }

    .detail-desc p {
      margin: 0 0 12px 0;
    }

    .detail-desc p:last-child {
      margin-bottom: 0;
    }

    .detail-link {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(232, 111, 51, 0.35);
      font-size: 12px;
    }

    .detail-link:hover {
      border-bottom-color: rgba(232, 111, 51, 0.8);
    }

    .detail-last-message {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .detail-last-meta {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    @supports (view-transition-name: none) {
      .task-card {
        contain: layout;
      }
    }

    ::view-transition-old(root),
    ::view-transition-new(root) {
      animation-duration: 220ms;
    }

    @media (prefers-reduced-motion: reduce) {
      ::view-transition-old(root),
      ::view-transition-new(root) {
        animation-duration: 0ms;
      }
    }

    /* Note form */
    .note-section {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }

    .note-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .note-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      resize: vertical;
      min-height: 60px;
    }

    .note-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .note-input::placeholder {
      color: var(--text-muted);
    }

    .note-submit {
      align-self: flex-end;
      padding: 8px 16px;
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: white;
      font-family: var(--mono);
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .note-submit:hover {
      filter: brightness(1.1);
    }

    /* Timeline removed */
    /* Notification bell */
    .icon-btn.notifications-active {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    /* Light mode */
    body.light {
      --bg-deep: #fafafa;
      --bg-surface: #ffffff;
      --bg-elevated: #f5f5f5;
      --bg-hover: #efefef;
      --border: #e5e5e5;
      --text-primary: #171717;
      --text-secondary: #525252;
      --text-tertiary: #737373;
      --text-muted: #a3a3a3;
      --accent-dim: rgba(232, 111, 51, 0.1);
      --accent-glow: rgba(232, 111, 51, 0.3);
      --success-dim: rgba(62, 207, 142, 0.1);
      --warning-dim: rgba(240, 180, 41, 0.1);
    }

    body.light::before {
      display: none;
    }

    /* Interactive elements */
    .icon-btn.delete:hover {
      background: rgba(239, 68, 68, 0.1);
      border-color: #ef4444;
    }

    .column-header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .column-header .icon-btn {
      width: 28px;
      height: 28px;
    }

    .column-header .icon-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Search input */
    .search-container {
      position: relative;
      padding: 0 12px 8px;
    }

    .search-input {
      width: 100%;
      padding: 8px 32px 8px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 12px;
      transition: all 0.15s ease;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-dim);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-clear {
      position: absolute;
      right: 18px;
      top: 8px;
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
      border-radius: 3px;
    }

    .search-clear:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .search-clear.visible {
      display: flex;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .modal-overlay.visible {
      display: flex;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .modal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .modal-close {
      width: 32px;
      height: 32px;
      border: none;
      background: none;
      color: var(--text-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: all 0.15s ease;
    }

    .modal-close:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .modal-body {
      margin-bottom: 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--mono);
      font-size: 14px;
      transition: all 0.15s ease;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .form-input::placeholder {
      color: var(--text-muted);
    }

    textarea.form-input {
      resize: vertical;
      min-height: 80px;
      font-family: var(--mono);
    }

    select.form-input[multiple] {
      padding: 4px;
    }

    select.form-input optgroup {
      background: var(--bg-surface);
      color: var(--accent);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 8px 4px 8px;
      margin-top: 4px;
      font-style: normal;
    }

    select.form-input optgroup:first-child {
      margin-top: 0;
    }

    select.form-input option {
      padding: 8px 8px 8px 16px;
      background: var(--bg-elevated);
      color: var(--text-primary);
      font-weight: 400;
      font-size: 13px;
      border-radius: 4px;
      margin: 2px 4px;
    }

    select.form-input option:checked {
      background: var(--accent);
      color: var(--bg-deep);
      font-weight: 500;
    }

    .modal-footer {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: #d96329;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    .btn-secondary {
      background: var(--bg-elevated);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }
  </style>
</head>
<body>
    <div class="app">
      <main class="main">
        <div id="no-session" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
        </svg>
        <p>No sessions found</p>
      </div>

      <div id="session-view" class="session-view">
        <header class="view-header">
          <div>
            <h1 id="session-title" class="view-title">All Sessions</h1>
            <p id="session-meta" class="view-meta"></p>
          </div>
          <div class="view-actions">
            <div class="session-controls">
              <label for="project-filter">Project</label>
              <select id="project-filter" class="project-filter" data-testid="project-filter">
                <option value="all">All projects</option>
              </select>
              <button
                id="bulk-archive-btn"
                class="bulk-archive-btn"
                data-testid="bulk-archive-btn"
                onclick="archiveSelectedSessions()"
                disabled>
                Archive selected (0)
              </button>
              <button
                id="clear-selection-btn"
                class="clear-selection-btn"
                data-testid="clear-selection-btn"
                onclick="clearSelectedSessions()"
                disabled>
                Clear selection
              </button>
            </div>
            <div id="connection-status" class="connection" data-testid="connection-status">
              <span class="connection-dot"></span>
              <span>Connecting</span>
            </div>
            <div class="view-progress">
              <div class="progress-bar">
                <div id="progress-bar" class="progress-fill" style="width: 0%"></div>
              </div>
              <span id="progress-percent" class="progress-text">0%</span>
            </div>
            <button id="notifications-toggle" class="icon-btn" onclick="toggleNotifications()" title="Toggle notifications">
              <svg id="bell-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/>
              </svg>
            </button>
            <button id="theme-toggle" class="icon-btn" onclick="toggleTheme()" title="Toggle theme">
              <svg id="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/>
              </svg>
              <svg id="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
                <circle cx="12" cy="12" r="5"/>
                <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
              </svg>
            </button>
          </div>
        </header>

         <div class="kanban">
           <div class="kanban-column">
             <div class="column-header">
               <span class="column-dot pending"></span>
               <span class="column-title pending">Pending</span>
             <span id="pending-count" class="column-count pending" data-testid="count-pending">0</span>
           </div>
             <div id="pending-tasks" class="column-tasks" data-testid="column-pending"></div>
          </div>

          <div class="kanban-column">
            <div class="column-header">
              <span class="column-dot in-progress"></span>
              <span class="column-title in-progress">In Progress</span>
              <span id="in-progress-count" class="column-count in-progress" data-testid="count-in-progress">0</span>
            </div>
            <div id="in-progress-tasks" class="column-tasks" data-testid="column-in-progress"></div>
          </div>

           <div class="kanban-column">
             <div class="column-header">
               <span class="column-dot completed"></span>
               <span class="column-title completed">Completed</span>
               <span id="completed-count" class="column-count completed" data-testid="count-completed">0</span>
             </div>
             <div id="completed-tasks" class="column-tasks" data-testid="column-completed"></div>
           </div>

           <div class="kanban-column">
             <div class="column-header">
               <span class="column-dot cancelled"></span>
               <span class="column-title cancelled">Cancelled</span>
               <span id="cancelled-count" class="column-count cancelled" data-testid="count-cancelled">0</span>
             </div>
             <div id="cancelled-tasks" class="column-tasks" data-testid="column-cancelled"></div>
           </div>
         </div>

      </div>
    </main>

    <!-- Detail panel -->
    <aside id="detail-panel" class="detail-panel">
      <header class="detail-header">
        <h3>Task Details</h3>
        <button id="close-detail" class="detail-close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </aside>
  </div>

  <script>
    // State
    const PROJECT_FILTER_STORAGE_KEY = 'otv.projectFilter';
    let currentSessions = [];
    let allSessionsCache = []; // Cache all sessions for notifications
    let notificationsEnabled = localStorage.getItem('notificationsEnabled') === 'true';
    let selectedProjectFilter = localStorage.getItem(PROJECT_FILTER_STORAGE_KEY) || 'all';
    let selectedSessionIds = new Set();
    let activeDetailSessionId = null;
    let bulkArchiveInFlight = false;

    // DOM
    const noSession = document.getElementById('no-session');
    const sessionView = document.getElementById('session-view');
    const sessionTitle = document.getElementById('session-title');
    const sessionMeta = document.getElementById('session-meta');
    const progressPercent = document.getElementById('progress-percent');
    const progressBar = document.getElementById('progress-bar');
    const pendingTasks = document.getElementById('pending-tasks');
    const inProgressTasks = document.getElementById('in-progress-tasks');
    const completedTasks = document.getElementById('completed-tasks');
    const cancelledTasks = document.getElementById('cancelled-tasks');
    const pendingCount = document.getElementById('pending-count');
    const inProgressCount = document.getElementById('in-progress-count');
    const completedCount = document.getElementById('completed-count');
    const cancelledCount = document.getElementById('cancelled-count');
    const detailPanel = document.getElementById('detail-panel');
    const detailContent = document.getElementById('detail-content');
    const connectionStatus = document.getElementById('connection-status');
    const projectFilter = document.getElementById('project-filter');
    const bulkArchiveBtn = document.getElementById('bulk-archive-btn');
    const clearSelectionBtn = document.getElementById('clear-selection-btn');

    // Sidebar (sessions list / filters / live updates) removed.

    // Sidebar and destructive actions removed.
    async function showAllSessions() {
      try {
        const oldStatuses = new Map();
        for (const s of allSessionsCache) {
          if (!s || !s.id) continue;
          oldStatuses.set(s.id, s.status);
        }

        const res = await fetch('/api/sessions?limit=all');
        if (!res.ok) throw new Error(`Failed to fetch sessions: ${res.status}`);
        const data = await res.json();
        const sessions = Array.isArray(data) ? data : [];
        allSessionsCache = sessions;

        syncProjectFilterOptions();
        currentSessions = getFilteredAndSortedSessions(allSessionsCache);
        pruneSelection();
        updateBulkArchiveUi();
        if (activeDetailSessionId && !allSessionsCache.some(s => s?.id === activeDetailSessionId)) {
          closeDetailPanel();
        }

        if (notificationsEnabled && oldStatuses.size > 0) {
          for (const s of sessions) {
            if (!s || !s.id) continue;
            const oldStatus = oldStatuses.get(s.id);
            if (oldStatus === 'in_progress' && s.status === 'completed') {
              fireSessionNotification(s);
            }
          }
        }

        renderAllSessions();
      } catch (error) {
        console.error('Failed to fetch sessions:', error);
        allSessionsCache = [];
        currentSessions = [];
        selectedSessionIds.clear();
        syncProjectFilterOptions();
        updateBulkArchiveUi();
        renderAllSessions();
      }
    }

    function renderAllSessions() {
      const overallTotal = allSessionsCache.length;
      const visibleTotal = currentSessions.length;
      if (overallTotal === 0) {
        sessionView.classList.remove('visible');
        noSession.style.display = 'flex';
        pendingCount.textContent = '0';
        inProgressCount.textContent = '0';
        completedCount.textContent = '0';
        cancelledCount.textContent = '0';
        pendingTasks.innerHTML = '<div class="column-empty">No pending sessions</div>';
        inProgressTasks.innerHTML = '<div class="column-empty">No in-progress sessions</div>';
        completedTasks.innerHTML = '<div class="column-empty">No completed sessions</div>';
        cancelledTasks.innerHTML = '<div class="column-empty">No cancelled sessions</div>';
        progressPercent.textContent = '0%';
        progressBar.style.width = '0%';
        sessionTitle.textContent = 'All Sessions';
        sessionMeta.textContent = '0 sessions';
        return;
      }

      noSession.style.display = 'none';
      sessionView.classList.add('visible');

      const completed = currentSessions.filter(s => s.status === 'completed').length;
      const percent = visibleTotal > 0 ? Math.round((completed / visibleTotal) * 100) : 0;

      sessionTitle.textContent = 'All Sessions';
      if (selectedProjectFilter === 'all') {
        sessionMeta.textContent = `${visibleTotal} sessions`;
      } else {
        sessionMeta.textContent = `${visibleTotal} of ${overallTotal} sessions`;
      }
      progressPercent.textContent = `${percent}%`;
      progressBar.style.width = `${percent}%`;

      renderWithCardTransitions(() => {
        renderKanban();
      });
    }

    function normalizeProjectPath(projectPath) {
      const raw = String(projectPath || '').trim();
      if (!raw || raw === '/' || raw === '\\') return '';
      return raw.replace(/\\/g, '/').replace(/\/+$/g, '');
    }

    function getAvailableProjects(sessions) {
      const byPath = new Map();
      for (const session of sessions || []) {
        const path = normalizeProjectPath(session?.project);
        if (!path || byPath.has(path)) continue;
        byPath.set(path, compactProjectLabel(path));
      }

      return Array.from(byPath.entries())
        .map(([path, label]) => ({ path, label }))
        .sort((a, b) => {
          const labelCmp = a.label.localeCompare(b.label, undefined, { sensitivity: 'base' });
          if (labelCmp !== 0) return labelCmp;
          return a.path.localeCompare(b.path, undefined, { sensitivity: 'base' });
        });
    }

    function syncProjectFilterOptions() {
      const projects = getAvailableProjects(allSessionsCache);
      const projectSet = new Set(projects.map(p => p.path));

      if (selectedProjectFilter !== 'all' && !projectSet.has(selectedProjectFilter)) {
        selectedProjectFilter = 'all';
        localStorage.setItem(PROJECT_FILTER_STORAGE_KEY, selectedProjectFilter);
      }

      const options = ['<option value="all">All projects</option>'];
      for (const project of projects) {
        options.push(`<option value="${escapeHtml(project.path)}">${escapeHtml(project.label)}</option>`);
      }

      projectFilter.innerHTML = options.join('');
      projectFilter.value = selectedProjectFilter;
    }

    function compareSessionsForBoard(a, b) {
      const aProjectPath = normalizeProjectPath(a?.project);
      const bProjectPath = normalizeProjectPath(b?.project);
      const aProjectLabel = compactProjectLabel(aProjectPath || '').toLowerCase();
      const bProjectLabel = compactProjectLabel(bProjectPath || '').toLowerCase();

      const projectLabelCmp = aProjectLabel.localeCompare(bProjectLabel, undefined, { sensitivity: 'base' });
      if (projectLabelCmp !== 0) return projectLabelCmp;

      const projectPathCmp = aProjectPath.localeCompare(bProjectPath, undefined, { sensitivity: 'base' });
      if (projectPathCmp !== 0) return projectPathCmp;

      const aName = String(a?.name || '').trim();
      const bName = String(b?.name || '').trim();
      const nameCmp = aName.localeCompare(bName, undefined, { sensitivity: 'base' });
      if (nameCmp !== 0) return nameCmp;

      return String(a?.id || '').localeCompare(String(b?.id || ''), undefined, { sensitivity: 'base' });
    }

    function getFilteredAndSortedSessions(sessions) {
      let list = Array.isArray(sessions) ? sessions.slice() : [];
      if (selectedProjectFilter !== 'all') {
        list = list.filter(s => normalizeProjectPath(s?.project) === selectedProjectFilter);
      }
      list.sort(compareSessionsForBoard);
      return list;
    }

    function pruneSelection() {
      const visibleIds = new Set(currentSessions.map(s => s?.id).filter(Boolean));
      selectedSessionIds = new Set(Array.from(selectedSessionIds).filter(id => visibleIds.has(id)));
    }

    function updateBulkArchiveUi() {
      const selectedCount = selectedSessionIds.size;
      bulkArchiveBtn.textContent = bulkArchiveInFlight
        ? `Archiving ${selectedCount}...`
        : `Archive selected (${selectedCount})`;
      bulkArchiveBtn.disabled = bulkArchiveInFlight || selectedCount === 0;
      clearSelectionBtn.disabled = bulkArchiveInFlight || selectedCount === 0;
    }

    function clearSelectedSessions() {
      if (bulkArchiveInFlight || selectedSessionIds.size === 0) return;
      selectedSessionIds.clear();
      updateBulkArchiveUi();
      renderAllSessions();
    }

    function onProjectFilterChanged() {
      selectedProjectFilter = projectFilter.value || 'all';
      localStorage.setItem(PROJECT_FILTER_STORAGE_KEY, selectedProjectFilter);
      currentSessions = getFilteredAndSortedSessions(allSessionsCache);
      pruneSelection();
      updateBulkArchiveUi();
      if (activeDetailSessionId && !currentSessions.some(s => s?.id === activeDetailSessionId)) {
        closeDetailPanel();
      }
      renderAllSessions();
    }

    function renderWithCardTransitions(renderFn) {
      const supportsTransitions = typeof document.startViewTransition === 'function';
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      if (supportsTransitions && !reducedMotion) {
        document.startViewTransition(() => renderFn());
        return;
      }

      renderFn();
    }

    // Session list removed.

    function renderSessionCard(session) {
      const sid = session?.id || '';
      const sidJs = escapeJsString(sid);
      const status = session?.status || 'pending';
      const statusClass = String(status).replace('_', '-');
      const title = session?.name || sid || 'Untitled session';
      const projectPath = session?.project || null;
      const projectLabel = projectPath ? compactProjectLabel(projectPath) : null;
      const runtimeType = session?.runtimeStatus?.type ? String(session.runtimeStatus.type).toLowerCase() : null;
      const retryBadge = runtimeType === 'retry' ? '<span class="runtime-pill">Retry</span>' : '';
      const modified = session?.modifiedAt ? timeAgo(session.modifiedAt) : null;
      const selected = selectedSessionIds.has(sid);
      const transitionName = getViewTransitionName(sid);

      return `
        <div
          onclick="showSessionDetail('${sidJs}')"
          data-testid="session-card"
          data-session-id="${escapeHtml(sid)}"
          data-status="${escapeHtml(status)}"
          class="task-card ${statusClass} has-selection ${selected ? 'selected' : ''}"
          style="view-transition-name: ${escapeHtml(transitionName)};">
          <input
            type="checkbox"
            class="card-select"
            data-testid="session-select"
            aria-label="Select session"
            ${selected ? 'checked' : ''}
            onclick="toggleSessionSelection(event, '${sidJs}')">
          <div class="task-title">${escapeHtml(title)}</div>
          ${(projectLabel || modified || retryBadge) ? `
            <div class="session-meta-row">
              <span class="session-project" title="${projectPath ? escapeHtml(projectPath) : ''}">${projectLabel ? escapeHtml(projectLabel) : ''}</span>
              <span class="session-right">${retryBadge}${modified ? `Updated ${escapeHtml(modified)}` : ''}</span>
            </div>
          ` : ''}
        </div>
      `;
    }

    function getViewTransitionName(sessionId) {
      const raw = String(sessionId || '').trim();
      if (!raw) return 'session-card';
      return `session-${raw.replace(/[^a-zA-Z0-9_-]/g, '-')}`;
    }

    function toggleSessionSelection(e, sessionId) {
      e?.stopPropagation?.();
      const sid = String(sessionId || '').trim();
      if (!sid) return;

      const checked = Boolean(e?.target?.checked);
      if (checked) selectedSessionIds.add(sid);
      else selectedSessionIds.delete(sid);

      const card = e?.target?.closest('.task-card');
      if (card) card.classList.toggle('selected', checked);
      updateBulkArchiveUi();
    }

    async function archiveSelectedSessions() {
      if (bulkArchiveInFlight) return;

      const selectedIds = Array.from(selectedSessionIds);
      if (selectedIds.length === 0) return;

      const sessionsById = new Map((allSessionsCache || []).map(s => [s?.id, s]));
      const runningCount = selectedIds.reduce((acc, sid) => {
        const runtimeType = sessionsById.get(sid)?.runtimeStatus?.type;
        return acc + (isRuntimeRunning(runtimeType) ? 1 : 0);
      }, 0);

      const confirmMessage = runningCount > 0
        ? `Archive ${selectedIds.length} selected sessions?\n\n${runningCount} currently running session(s) will also be archived.`
        : `Archive ${selectedIds.length} selected sessions?`;

      if (!confirm(confirmMessage)) return;

      bulkArchiveInFlight = true;
      updateBulkArchiveUi();

      try {
        const failed = [];
        const granular = await Promise.all(selectedIds.map(async (sid) => {
          try {
            const res = await fetch(`/api/sessions/${encodeURIComponent(sid)}/archive`, { method: 'POST' });
            if (!res.ok) {
              const body = await res.json().catch(() => null);
              throw new Error(body?.error || `Failed (HTTP ${res.status})`);
            }
            return { sid, ok: true };
          } catch (error) {
            return { sid, ok: false, error: error?.message || 'Failed to archive' };
          }
        }));

        const succeeded = granular.filter(x => x.ok).length;
        for (const x of granular) {
          if (!x.ok) failed.push(`${x.sid}: ${x.error}`);
        }

        if (activeDetailSessionId && selectedIds.includes(activeDetailSessionId)) {
          closeDetailPanel();
        }

        selectedSessionIds.clear();
        await showAllSessions();

        if (failed.length > 0) {
          alert(`${succeeded} archived, ${failed.length} failed.\n\n${failed.join('\n')}`);
        }
      } finally {
        bulkArchiveInFlight = false;
        updateBulkArchiveUi();
      }
    }

    function isRuntimeRunning(type) {
      if (!type) return false;
      const t = String(type).trim().toLowerCase();
      return t === 'busy' || t === 'retry' || t === 'running';
    }

    function renderKanban() {
      const pending = currentSessions.filter(s => s.status === 'pending');
      const inProgress = currentSessions.filter(s => s.status === 'in_progress');
      const completed = currentSessions.filter(s => s.status === 'completed');
      const cancelled = currentSessions.filter(s => s.status === 'cancelled');

      pendingCount.textContent = pending.length;
      inProgressCount.textContent = inProgress.length;
      completedCount.textContent = completed.length;
      cancelledCount.textContent = cancelled.length;

      pendingTasks.innerHTML = pending.length > 0
        ? pending.map(renderSessionCard).join('')
        : '<div class="column-empty">No pending sessions</div>';

      inProgressTasks.innerHTML = inProgress.length > 0
        ? inProgress.map(renderSessionCard).join('')
        : '<div class="column-empty">No in-progress sessions</div>';

      completedTasks.innerHTML = completed.length > 0
        ? completed.map(renderSessionCard).join('')
        : '<div class="column-empty">No completed sessions</div>';

      cancelledTasks.innerHTML = cancelled.length > 0
        ? cancelled.map(renderSessionCard).join('')
        : '<div class="column-empty">No cancelled sessions</div>';

    }

    function showSessionDetail(sessionId) {
      const session = currentSessions.find(s => s && s.id === sessionId);
      if (!session) return;

      activeDetailSessionId = sessionId;
      detailPanel.classList.add('visible');

      const statusLabels = {
        completed: '<span class="detail-status completed"><span class="dot"></span>Completed</span>',
        in_progress: '<span class="detail-status in_progress"><span class="dot"></span>In Progress</span>',
        pending: '<span class="detail-status pending"><span class="dot"></span>Pending</span>',
        cancelled: '<span class="detail-status cancelled"><span class="dot"></span>Cancelled</span>'
      };

      const sid = session.id || '';
      const sessionName = session.name || (sid ? sid.slice(0, 8) + '...' : '');
      const projectPath = session.project || null;
      const runtime = session.runtimeStatus?.type || 'idle';
      const createdAt = session.createdAt ? formatDateTime(session.createdAt) : null;
      const modifiedAt = session.modifiedAt ? formatDateTime(session.modifiedAt) : null;
      const openCodeUrl = sanitizeUrl(session.openCodeUrl || '');

      detailContent.innerHTML = `
        <div class="detail-section">
          <div class="detail-label">Session</div>
          <h2 class="detail-title">${escapeHtml(sessionName || sid || 'Unknown')}</h2>
          ${sid ? `<div style="font-size: 11px; color: var(--text-muted); margin-top: 8px;">id: ${escapeHtml(sid)}</div>` : ''}
        </div>

        <div class="detail-section">
          <div class="detail-label">Status</div>
          ${statusLabels[session.status] || statusLabels.pending}
          <div style="font-size: 11px; color: var(--text-muted); margin-top: 6px;">Derived from runtime status and assistant response history</div>
        </div>

        <div class="detail-section">
          <div class="detail-label">Runtime</div>
          <div style="font-size: 12px; color: var(--text-secondary);">${escapeHtml(String(runtime).toUpperCase())}</div>
        </div>

        ${projectPath ? `
          <div class="detail-section">
            <div class="detail-label">Project</div>
            <div style="font-size: 12px; color: var(--text-secondary); word-break: break-word;">${escapeHtml(projectPath)}</div>
          </div>
        ` : ''}

        ${(createdAt || modifiedAt) ? `
          <div class="detail-section">
            <div class="detail-label">Timestamps</div>
            ${createdAt ? `<div style="font-size: 12px; color: var(--text-secondary);">Created: ${escapeHtml(createdAt)}</div>` : ''}
            ${modifiedAt ? `<div style="font-size: 12px; color: var(--text-secondary); margin-top: 6px;">Updated: ${escapeHtml(modifiedAt)}</div>` : ''}
          </div>
        ` : ''}

        ${openCodeUrl ? `
          <div class="detail-section">
            <div class="detail-label">OpenCode</div>
            <a
              class="detail-link"
              data-testid="detail-opencode-link"
              href="${escapeHtml(openCodeUrl)}"
              target="_blank"
              rel="noopener noreferrer">
              View in OpenCode Web
            </a>
          </div>
        ` : ''}

        <div class="detail-section">
          <div class="detail-label">Last agent message</div>
          <div id="detail-last-agent-message" data-testid="detail-last-agent-message" class="detail-last-message">Loading...</div>
          <div id="detail-last-agent-meta" class="detail-last-meta"></div>
        </div>
      `;

      loadLastAssistantMessage(sessionId);
    }

    function closeDetailPanel() {
      activeDetailSessionId = null;
      detailPanel.classList.remove('visible');
    }

    async function loadLastAssistantMessage(sessionId) {
      const sid = String(sessionId || '').trim();
      if (!sid) return;

      const messageEl = document.getElementById('detail-last-agent-message');
      const metaEl = document.getElementById('detail-last-agent-meta');
      if (!messageEl || !metaEl) return;

      messageEl.textContent = 'Loading...';
      metaEl.textContent = '';

      try {
        const res = await fetch(`/api/sessions/${encodeURIComponent(sid)}/last-assistant-message`);
        if (!res.ok) {
          throw new Error(`Failed (HTTP ${res.status})`);
        }

        if (activeDetailSessionId !== sid) return;

        const data = await res.json();
        const text = String(data?.message || '').trim();
        const createdAt = data?.createdAt ? formatDateTime(data.createdAt) : null;

        if (!text) {
          messageEl.textContent = 'No assistant message yet.';
          metaEl.textContent = createdAt ? `Last assistant activity: ${createdAt}` : '';
          return;
        }

        messageEl.textContent = text;
        metaEl.textContent = createdAt ? `Sent ${createdAt}` : '';
      } catch (error) {
        if (activeDetailSessionId !== sid) return;
        messageEl.textContent = 'Unable to load the last agent message.';
        metaEl.textContent = '';
      }
    }

    document.getElementById('close-detail').onclick = closeDetailPanel;
    projectFilter.addEventListener('change', onProjectFilterChanged);

    document.addEventListener('keydown', (e) => {
      // Ignore if typing in input/textarea
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        return;
      }

      if (e.key === 'Escape' && detailPanel.classList.contains('visible')) {
        closeDetailPanel();
      }
    });

    function setupEventSource() {
      let retryDelay = 1000;
      let eventSource;
      let refreshTimer = null;

      function connect() {
        eventSource = new EventSource('/api/events');

        eventSource.onopen = () => {
          retryDelay = 1000; // Reset on successful connection
          connectionStatus.innerHTML = `
            <span class="connection-dot live"></span>
            <span>Connected</span>
          `;
        };

        eventSource.onerror = () => {
          eventSource.close();
          connectionStatus.innerHTML = `
            <span class="connection-dot error"></span>
            <span>Reconnecting...</span>
          `;
          setTimeout(connect, retryDelay);
          retryDelay = Math.min(retryDelay * 2, 30000); // Max 30s
        };

        eventSource.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.type !== 'update' && data.type !== 'metadata-update') return;

          if (refreshTimer) clearTimeout(refreshTimer);
          refreshTimer = setTimeout(() => {
            showAllSessions().catch(err => console.error('[SSE] showAllSessions failed:', err));
          }, 150);
        };
      }

      connect();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeJsString(text) {
      return String(text || '')
        .replace(/\\/g, '\\\\')
        .replace(/'/g, "\\'")
        .replace(/\n/g, '\\n')
        .replace(/\r/g, '\\r');
    }

    function compactProjectLabel(projectPath) {
      const raw = String(projectPath || '').trim();
      if (!raw) return '';
      if (raw === '/' || raw === '\\') return 'global';

      const normalized = raw.replace(/\\/g, '/').replace(/\/+$/g, '');
      const parts = normalized.split('/').filter(Boolean);
      return parts.length > 0 ? parts[parts.length - 1] : normalized;
    }

    function timeAgo(iso) {
      const ts = new Date(iso).getTime();
      if (!Number.isFinite(ts)) return '';
      const delta = Math.max(0, Date.now() - ts);
      const s = Math.round(delta / 1000);
      if (s < 10) return 'just now';
      if (s < 60) return `${s}s ago`;
      const m = Math.round(s / 60);
      if (m < 60) return `${m}m ago`;
      const h = Math.round(m / 60);
      if (h < 24) return `${h}h ago`;
      const d = Math.round(h / 24);
      return `${d}d ago`;
    }

    function formatDateTime(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleString();
    }

    function sanitizeUrl(url) {
      const raw = String(url || '').trim();
      if (!raw) return null;

      // Allow in-page anchors.
      if (raw.startsWith('#')) return raw;

      // Only allow common safe schemes.
      const lowered = raw.toLowerCase();
      if (lowered.startsWith('http://') || lowered.startsWith('https://') || lowered.startsWith('mailto:')) {
        return raw;
      }

      return null;
    }

    // Render a safe subset of Markdown to HTML.
    // - Escapes all HTML first.
    // - Supports headings, paragraphs, blockquotes, lists, links, inline code, fenced code blocks.
    function renderTodoMarkdown(markdown) {
      const src = String(markdown || '').replace(/\r\n/g, '\n');
      if (!src.trim()) return '<p>(empty)</p>';

      const lines = src.split('\n');
      let out = '';
      let inCode = false;
      let codeLang = '';
      let codeLines = [];
      let para = [];
      let listMode = null; // 'ul' | 'ol'
      let listItems = [];

      function renderInline(text) {
        let html = escapeHtml(text);

        // Inline code
        html = html.replace(/`([^`]+)`/g, (_m, code) => `<code>${code}</code>`);

        // Bold
        html = html.replace(/\*\*([^*]+)\*\*/g, (_m, inner) => `<strong>${inner}</strong>`);

        // Links [text](url)
        html = html.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_m, label, url) => {
          const safe = sanitizeUrl(url);
          if (!safe) return label;
          const href = escapeHtml(safe);
          return `<a href="${href}" target="_blank" rel="noopener noreferrer">${label}</a>`;
        });

        // Preserve line breaks inside paragraphs
        html = html.replace(/\n/g, '<br>');
        return html;
      }

      function flushPara() {
        if (para.length === 0) return;
        out += `<p>${renderInline(para.join('\n'))}</p>`;
        para = [];
      }

      function flushList() {
        if (!listMode) return;
        out += `<${listMode}>${listItems.join('')}</${listMode}>`;
        listMode = null;
        listItems = [];
      }

      function closeCodeBlock() {
        const langClass = codeLang ? ` class="language-${escapeHtml(codeLang)}"` : '';
        out += `<pre><code${langClass}>${escapeHtml(codeLines.join('\n'))}</code></pre>`;
        inCode = false;
        codeLang = '';
        codeLines = [];
      }

      for (const line of lines) {
        if (inCode) {
          if (/^```\s*$/.test(line)) {
            closeCodeBlock();
          } else {
            codeLines.push(line);
          }
          continue;
        }

        const fence = line.match(/^```\s*([a-zA-Z0-9_-]+)?\s*$/);
        if (fence) {
          flushPara();
          flushList();
          inCode = true;
          codeLang = fence[1] || '';
          codeLines = [];
          continue;
        }

        if (/^\s*$/.test(line)) {
          flushPara();
          flushList();
          continue;
        }

        const heading = line.match(/^(#{1,4})\s+(.+)$/);
        if (heading) {
          flushPara();
          flushList();
          const level = heading[1].length;
          const text = renderInline(heading[2]);
          out += `<h${level}>${text}</h${level}>`;
          continue;
        }

        const quote = line.match(/^>\s+(.+)$/);
        if (quote) {
          flushPara();
          flushList();
          out += `<blockquote>${renderInline(quote[1])}</blockquote>`;
          continue;
        }

        if (/^---\s*$/.test(line) || /^\*\*\*\s*$/.test(line)) {
          flushPara();
          flushList();
          out += '<hr>';
          continue;
        }

        const ol = line.match(/^\s*(\d+)\.\s+(.+)$/);
        if (ol) {
          flushPara();
          if (listMode && listMode !== 'ol') flushList();
          listMode = 'ol';
          listItems.push(`<li>${renderInline(ol[2])}</li>`);
          continue;
        }

        const ul = line.match(/^\s*[-*+]\s+(.+)$/);
        if (ul) {
          flushPara();
          if (listMode && listMode !== 'ul') flushList();
          listMode = 'ul';
          listItems.push(`<li>${renderInline(ul[1])}</li>`);
          continue;
        }

        para.push(line);
      }

      if (inCode) closeCodeBlock();
      flushPara();
      flushList();
      return out;
    }

    function markdownToPlainText(markdown) {
      const src = String(markdown || '');
      if (!src) return '';

      // Drop fenced code blocks entirely (keep a placeholder line).
      let s = src.replace(/```[\s\S]*?```/g, '[code]');

      // Replace links/images with their labels.
      s = s.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '$1');
      s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '$1');

      // Strip common markers.
      s = s.replace(/`([^`]+)`/g, '$1');
      s = s.replace(/\*\*([^*]+)\*\*/g, '$1');
      s = s.replace(/^(#{1,6})\s+/gm, '');
      s = s.replace(/^\s*[-*+]\s+\[[ xX]\]\s+/gm, '');
      s = s.replace(/^\s*[-*+]\s+/gm, '');
      s = s.replace(/^\s*\d+\.\s+/gm, '');
      s = s.replace(/^>\s+/gm, '');

      // Collapse whitespace; keep first non-empty line.
      const firstLine = s.split(/\r?\n/).map(x => x.trim()).find(Boolean) || '';
      return firstLine;
    }

    function toggleTheme() {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      document.getElementById('theme-icon-dark').style.display = isLight ? 'none' : 'block';
      document.getElementById('theme-icon-light').style.display = isLight ? 'block' : 'none';
    }

    function loadTheme() {
      if (localStorage.getItem('theme') === 'light') {
        document.body.classList.add('light');
        document.getElementById('theme-icon-dark').style.display = 'none';
        document.getElementById('theme-icon-light').style.display = 'block';
      }
    }

    // --- Notification functions ---

    function toggleNotifications() {
      if (!notificationsEnabled && Notification.permission !== 'granted') {
        Notification.requestPermission().then(perm => {
          if (perm === 'granted') {
            notificationsEnabled = true;
            localStorage.setItem('notificationsEnabled', 'true');
            updateNotificationButton();
          }
        });
      } else {
        notificationsEnabled = !notificationsEnabled;
        localStorage.setItem('notificationsEnabled', String(notificationsEnabled));
        updateNotificationButton();
      }
    }

    function updateNotificationButton() {
      const btn = document.getElementById('notifications-toggle');
      if (notificationsEnabled) {
        btn.classList.add('notifications-active');
        btn.title = 'Notifications on (click to mute)';
      } else {
        btn.classList.remove('notifications-active');
        btn.title = 'Notifications off (click to enable)';
      }
    }

    function fireSessionNotification(session) {
      // Desktop notification
      if (Notification.permission === 'granted') {
        const n = new Notification('Session completed', {
          body: session.name || session.id || 'Session',
          icon: undefined,
          tag: `session-${session.id}`
        });
        n.onclick = () => {
          window.focus();
          showAllSessions().then(() => showSessionDetail(session.id));
          n.close();
        };
      }

      // Audio chime (C5 → E5, two-tone)
      playChime();
    }

    function playChime() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const now = ctx.currentTime;

        // First tone: C5 (523Hz)
        const osc1 = ctx.createOscillator();
        const gain1 = ctx.createGain();
        osc1.frequency.value = 523;
        osc1.type = 'sine';
        gain1.gain.setValueAtTime(0.15, now);
        gain1.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc1.connect(gain1);
        gain1.connect(ctx.destination);
        osc1.start(now);
        osc1.stop(now + 0.15);

        // Second tone: E5 (659Hz)
        const osc2 = ctx.createOscillator();
        const gain2 = ctx.createGain();
        osc2.frequency.value = 659;
        osc2.type = 'sine';
        gain2.gain.setValueAtTime(0.15, now + 0.1);
        gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
        osc2.connect(gain2);
        gain2.connect(ctx.destination);
        osc2.start(now + 0.1);
        osc2.stop(now + 0.25);

        // Clean up
        setTimeout(() => ctx.close(), 500);
      } catch (e) {
        // Audio not available
      }
    }

    // Init
    loadTheme();
    updateNotificationButton();
    setupEventSource();
    showAllSessions();
  </script>
